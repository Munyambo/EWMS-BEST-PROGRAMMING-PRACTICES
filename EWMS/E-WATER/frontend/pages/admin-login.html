<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — EWMS WASAC</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo">
      <div class="icon" style="background:var(--gray-800)">🏢</div>
      <h1>Admin Portal</h1>
      <p>WASAC Staff Access · E-Water Management System</p>
    </div>

    <div class="alert alert-error" id="alert-error"></div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Staff email</label>
        <input type="email" id="email" placeholder="Staff Email" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required/>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn"
              style="background:var(--gray-800);border-color:var(--gray-800)">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Admin sign in</span>
      </button>
    </form>

    <div class="auth-link">
      <a href="login.html" style="color:var(--gray-400)">← Back to homeowner login</a>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    showLoading(true);

    try {
      const res = await api('/auth/admin-login', 'POST', {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      localStorage.setItem('token',     res.token);
      localStorage.setItem('user',      JSON.stringify(res.user));
      localStorage.setItem('adminMode', '1');
      window.location.href = 'admin-dashboard.html';
    } catch (err) {
      showAlert('alert-error', err.message || 'Invalid admin credentials');
    } finally {
      showLoading(false);
    }
  });
</script>
</body>
</html>
